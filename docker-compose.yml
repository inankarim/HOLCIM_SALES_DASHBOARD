version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: sales_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./Sales_Dashboard/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - sales_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI microservice that merges the two daily Excel exports.
  # Service name matches uploadController.ts's default MERGE_SERVICE_URL
  # host (sales-summary-service), so backend doesn't strictly need the env
  # var below to find it — it's set explicitly anyway for clarity.
  sales-summary-service:
    image: inankarim/sales_merge_service:latest
    container_name: sales_merge_service
    restart: always
    networks:
      - sales_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    image: inankarim/sales_backend:latest
    container_name: sales_backend
    restart: always
    environment:
      PORT: 5001
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      EMAIL_USER: inankarimchowdhury@gmail.com
      EMAIL_PASS: ${EMAIL_PASS}
      NODE_ENV: production
      MERGE_SERVICE_URL: http://sales-summary-service:8000
      FRONTEND_URL: http://10.238.128.70
    depends_on:
      db:
        condition: service_healthy
      sales-summary-service:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - sales_network

  frontend:
    image: inankarim/sales_frontend:latest
    container_name: sales_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sales_network

volumes:
  pgdata:
  uploads:

networks:
  sales_network:
    driver: bridge